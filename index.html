<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<title>董董Mercurio星球书单</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
:root {
  --ink: #1a1410;
  --paper: #f5f0e8;
  --paper-dark: #e8e0d0;
  --accent: #8b2e12;
  --accent-light: #c4451e;
  --gold: #b8960c;
  --muted: #7a7060;
  --border: #cfc5b0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Serif SC', serif;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(0,0,0,0.04) 28px);
}

.page-wrap {
  max-width: 920px;
  margin: 0 auto;
  padding: 60px 40px 100px;
  position: relative;
  z-index: 1;
}

/* ── Header ── */

header {
  text-align: center;
  margin-bottom: 52px;
  padding-bottom: 36px;
  border-bottom: 2px solid var(--ink);
}

header::after {
  content: '';
  display: block;
  width: 60px;
  height: 2px;
  background: var(--accent);
  margin: 12px auto 0;
}

.header-label {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 13px;
  letter-spacing: 4px;
  color: var(--muted);
  margin-bottom: 16px;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 44px;
  font-weight: 700;
  line-height: 1.1;
  color: var(--ink);
  margin-bottom: 8px;
}

.subtitle {
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 1px;
  font-weight: 300;
}

/* ── Stats bar ── */

.stats {
  display: flex;
  margin-bottom: 40px;
  background: white;
  border-left: 3px solid var(--accent);
}

.stat-item {
  text-align: center;
  padding: 16px 28px;
  border-right: 1px solid var(--border);
}

.stat-item:last-child { border-right: none; }

.stat-num {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  color: var(--accent);
  display: block;
  line-height: 1;
}

.stat-label {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
  margin-top: 4px;
}

/* ── Search ── */

.search-bar {
  position: relative;
  margin-bottom: 32px;
}

.search-bar input {
  width: 100%;
  padding: 13px 20px 13px 46px;
  font-family: 'Noto Serif SC', serif;
  font-size: 14px;
  background: white;
  border: 1.5px solid var(--border);
  color: var(--ink);
  outline: none;
  transition: border-color .2s;
}

.search-bar input::placeholder { color: var(--muted); }
.search-bar input:focus { border-color: var(--accent); }

.search-bar::before {
  content: '🔍';
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 15px;
  opacity: .45;
}

/* ── Filter tabs ── */

.filter-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 32px;
}

.tab-btn {
  padding: 5px 13px;
  font-family: 'Noto Serif SC', serif;
  font-size: 12px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
  letter-spacing: .5px;
}

.tab-btn:hover,
.tab-btn.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

/* ── Legend ── */

.legend {
  display: flex;
  gap: 20px;
  margin-bottom: 28px;
  font-size: 12px;
  color: var(--muted);
  align-items: center;
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.leg-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
}

.leg-badge {
  width: 13px;
  height: 13px;
  border-radius: 50%;
  color: white;
  font-size: 8px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Sections ── */

.section {
  margin-bottom: 48px;
  animation: fadeUp .4s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

.section-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 18px;
  padding-bottom: 10px;
  border-bottom: 1.5px solid var(--border);
}

.section-emoji { font-size: 18px; }

.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 21px;
  font-weight: 700;
  color: var(--ink);
}

.section-count {
  font-size: 11px;
  color: var(--muted);
  font-weight: 300;
  margin-left: auto;
  letter-spacing: 1px;
}

.subsection { margin-bottom: 18px; }

.subsection-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 9px;
}

/* ── Book grid ── */

.book-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 7px;
}

.book-item {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  padding: 10px 13px;
  background: white;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all .15s;
  user-select: none;
  position: relative;
}

.book-item:hover {
  border-color: var(--accent-light);
  background: #fdf9f5;
  transform: translateX(3px);
}

.book-item.no-click {
  cursor: default;
  opacity: .55;
}

.book-item.no-click:hover {
  transform: none;
  border-color: transparent;
  background: white;
}

.book-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
  margin-top: 8px;
  flex-shrink: 0;
}

.book-body { flex: 1; min-width: 0; }
.book-main { font-size: 13.5px; line-height: 1.5; color: var(--ink); }
.book-subject { color: var(--muted); font-size: 12.5px; }

.book-about {
  position: absolute;
  top: -1px;
  right: -1px;
  font-size: 10px;
  color: var(--muted);
  background: var(--paper-dark);
  padding: 2px 7px;
  letter-spacing: .4px;
  opacity: .85;
}

.book-en {
  display: block;
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 13.5px;
  color: var(--muted);
  margin-top: 3px;
  line-height: 1.35;
}

.tag { font-size: 9px; font-weight: 700; margin-left: 4px; }
.tag-q { color: var(--gold); }

/* ── View toggle ── */

.view-toggle { display: flex; gap: 8px; margin-bottom: 16px; }

.view-btn {
  padding: 6px 16px;
  font-family: 'Noto Serif SC', serif;
  font-size: 12px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
}

.view-btn:hover,
.view-btn.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

/* ── Map ── */

.map-wrap {
  position: relative;
  background: #b8cdd6;
  border: 1px solid var(--border);
  overflow: hidden;
  margin-bottom: 6px;
}

.map-loading {
  padding: 80px 40px;
  text-align: center;
  color: var(--muted);
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 15px;
}

#worldMap svg { display: block; width: 100%; }

.map-note {
  font-size: 11px;
  color: var(--muted);
  text-align: right;
  margin-bottom: 18px;
  font-family: 'EB Garamond', serif;
  font-style: italic;
}

.map-tooltip {
  position: absolute;
  background: var(--paper);
  border: 1px solid var(--border);
  border-top: 2px solid var(--accent);
  padding: 14px 32px 14px 16px;
  max-width: 280px;
  min-width: 160px;
  z-index: 20;
  box-shadow: 0 6px 28px rgba(0,0,0,.2);
  display: none;
}

.map-tt-close {
  position: absolute;
  top: 8px;
  right: 10px;
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  padding: 2px 4px;
  transition: color .1s;
}

.map-tt-close:hover { color: var(--accent); }

.map-tt-region {
  font-family: 'Playfair Display', serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.map-tt-book {
  font-size: 12.5px;
  color: var(--accent);
  cursor: pointer;
  padding: 4px 0;
  line-height: 1.4;
  display: block;
  transition: color .1s;
  font-family: 'Noto Serif SC', serif;
}

.map-tt-book:hover {
  color: var(--accent-light);
  text-decoration: underline;
}

.map-tt-en {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  color: var(--muted);
  font-size: 12px;
  display: block;
  margin-top: 1px;
}

/* ── Media ── */

.media-group { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

.media-column h4 {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 9px;
  font-weight: 600;
}

.media-hint {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 10px;
  padding-left: 10px;
  border-left: 2px solid var(--border);
  opacity: .8;
}

.media-hint a {
  color: var(--muted);
  text-decoration: underline;
  text-underline-offset: 2px;
}

.media-hint a:hover { color: var(--accent); }

.media-tags { display: flex; flex-wrap: wrap; gap: 8px; }

.media-tag {
  padding: 8px 16px;
  background: var(--paper-dark);
  font-size: 13px;
  color: var(--ink);
  font-family: 'EB Garamond', serif;
  text-decoration: none;
  display: inline-block;
  border-left: 2px solid var(--border);
  transition: background .15s, color .15s, border-color .15s;
}

a.media-tag:hover {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
  cursor: pointer;
}

.media-tag-zh { font-family: 'Noto Serif SC', serif; }

.media-series {
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}

.media-series h4 {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 9px;
  font-weight: 600;
}

/* ── Modal ── */

.no-results {
  text-align: center;
  padding: 50px;
  color: var(--muted);
  font-style: italic;
  display: none;
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(26,20,16,.58);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}

.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal-box {
  background: var(--paper);
  max-width: 540px;
  width: 100%;
  padding: 36px 40px 32px;
  position: relative;
  border-top: 3px solid var(--accent);
  box-shadow: 0 24px 70px rgba(0,0,0,.28);
  transform: translateY(12px);
  transition: transform .2s;
}

.modal-overlay.open .modal-box { transform: translateY(0); }

.modal-close {
  position: absolute;
  top: 14px;
  right: 18px;
  background: none;
  border: none;
  font-size: 22px;
  color: var(--muted);
  cursor: pointer;
  transition: color .15s;
}

.modal-close:hover { color: var(--accent); }

.modal-cat {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 8px;
  font-family: 'EB Garamond', serif;
  font-style: italic;
}

.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 6px;
  line-height: 1.3;
}

.modal-en {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 17px;
  color: var(--muted);
  margin-bottom: 12px;
  line-height: 1.4;
}

.modal-meta {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 20px;
  min-height: 1em;
}

.modal-divider { height: 1px; background: var(--border); margin-bottom: 18px; }

.modal-desc {
  font-size: 14px;
  line-height: 1.95;
  color: #3a332c;
  min-height: 72px;
}

.modal-footer {
  margin-top: 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.modal-douban {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  background: #2d7037;
  color: white;
  font-size: 13px;
  text-decoration: none;
  font-family: 'Noto Serif SC', serif;
  transition: background .15s;
}

.modal-douban:hover { background: #3d8c47; }

.modal-zlib {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  background: #1f7ba0;
  color: white;
  font-size: 13px;
  text-decoration: none;
  font-family: 'Noto Serif SC', serif;
  transition: background .15s;
}

.modal-zlib:hover { background: #155a7a; }

.modal-warn { font-size: 11px; color: var(--gold); font-style: italic; }

/* ── Footer / utilities ── */

footer {
  text-align: center;
  padding-top: 36px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--muted);
  font-family: 'EB Garamond', serif;
  font-style: italic;
}

.hidden { display: none !important; }

@media (max-width: 600px) {
  .page-wrap   { padding: 36px 18px 60px; }
  h1           { font-size: 30px; }
  .book-grid   { grid-template-columns: 1fr; }
  .media-group { grid-template-columns: 1fr; }
  .modal-box   { padding: 28px 22px 24px; }
  .stat-item   { padding: 12px 14px; }
}

/* ── Feedback floating button & modal ── */
#feedbackBtn {
  position: fixed;
  bottom: 28px;
  right: 28px;
  z-index: 200;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(0,0,0,.18);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform .15s, box-shadow .15s;
}
#feedbackBtn:hover { transform: scale(1.08); box-shadow: 0 6px 18px rgba(0,0,0,.24); }

.feedback-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 201;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.feedback-overlay.open { opacity: 1; pointer-events: all; }

.feedback-box {
  background: #f5f0e8;
  border-radius: 14px;
  padding: 32px 28px 28px;
  width: min(480px, 92vw);
  position: relative;
  box-shadow: 0 12px 40px rgba(0,0,0,.25);
}
.feedback-close {
  position: absolute;
  top: 14px;
  right: 18px;
  background: none;
  border: none;
  font-size: 22px;
  color: var(--muted);
  cursor: pointer;
  line-height: 1;
}
.feedback-close:hover { color: var(--text); }
.feedback-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 20px;
}
.feedback-box label {
  display: block;
  font-size: 12px;
  color: #7a7060;
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 5px;
  margin-top: 14px;
}
.feedback-box input,
.feedback-box textarea {
  width: 100%;
  box-sizing: border-box;
  background: #ebe6da;
  border: 1px solid #cfc5b0;
  border-radius: 7px;
  padding: 9px 12px;
  font-size: 14px;
  color: #1a1410;
  font-family: inherit;
  resize: vertical;
  outline: none;
  transition: border-color .15s;
}
.feedback-box input:focus,
.feedback-box textarea:focus { border-color: #8b2e12; }
.feedback-submit {
  margin-top: 20px;
  width: 100%;
  padding: 10px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s;
}
.feedback-submit:disabled { opacity: .55; cursor: default; }
.feedback-error { color: #c0392b; font-size: 13px; margin-top: 10px; }
.feedback-success { text-align: center; padding: 20px 0; color: var(--text); font-size: 15px; }
</style>
</head>
<body>
<div class="page-wrap">
<header>
  <div class="header-label">Mercurio Booklist</div>
  <h1>董董Mercurio星球书单</h1>
  <div class="subtitle">点击书名查看简介 · 点击地图国家探索书籍</div>
</header>
<div class="stats">
  <div class="stat-item"><span class="stat-num" id="totalCount">—</span><div class="stat-label">本书</div></div>
  <div class="stat-item"><span class="stat-num">13</span><div class="stat-label">分类</div></div>
  <div class="stat-item"><span class="stat-num" id="visibleCount">—</span><div class="stat-label">当前显示</div></div>
</div>
<div class="search-bar">
  <input type="text" id="searchInput" placeholder="搜索书名、人名、作者、原书名……" oninput="onSearch()">
</div>
<div class="filter-tabs">
  <button class="tab-btn active" onclick="filterCat('all',this)">全部</button>
  <button class="tab-btn" onclick="filterCat('biography',this)">传记</button>
  <button class="tab-btn" onclick="filterCat('business',this)">商业</button>
  <button class="tab-btn" onclick="filterCat('geopolitical',this)">🌍 政治·历史·地理</button>
  <button class="tab-btn" onclick="filterCat('social',this)">社会科学</button>
  <button class="tab-btn" onclick="filterCat('philosophy',this)">哲学</button>
  <button class="tab-btn" onclick="filterCat('psychology',this)">心理/成长</button>
  <button class="tab-btn" onclick="filterCat('tech',this)">科技 / 科学</button>
  <button class="tab-btn" onclick="filterCat('literature',this)">文学</button>
  <button class="tab-btn" onclick="filterCat('art',this)">艺术/文化</button>
  <button class="tab-btn" onclick="filterCat('sports',this)">运动/健康</button>
  <button class="tab-btn" onclick="filterCat('media',this)">媒体</button>
</div>
<div class="legend">
  <div class="legend-item"><div class="leg-dot"></div> 已确认书目</div>
  <div class="legend-item"><div style="font-family:'EB Garamond',serif;font-style:italic;font-size:13px;color:var(--muted)">Italic</div> 原版书名</div>
</div>
<div id="root"></div>
<div class="no-results" id="noResults">未找到相关书目</div>
<footer>整理 by 菇</footer>
</div>
<button id="feedbackBtn" onclick="openFeedback()" title="建议书目 / 纠错">✉️</button>
<div class="feedback-overlay" id="feedbackOverlay" onclick="maybeFeedbackClose(event)">
  <div class="feedback-box">
    <button class="feedback-close" onclick="closeFeedback()">×</button>
    <div class="feedback-title">有反馈？</div>
    <div id="feedbackForm">
      <form onsubmit="submitFeedback(event)">
        <label for="fEmail">邮箱 / 星球ID</label>
        <input id="fEmail" name="email" type="text" required placeholder="方便回复你">
        <label for="fMessage">留言</label>
        <textarea id="fMessage" name="message" rows="5" required placeholder="想补充的书、发现的错误..."></textarea>
        <button class="feedback-submit" id="feedbackSubmitBtn" type="submit">发送</button>
        <div class="feedback-error" id="feedbackError"></div>
      </form>
    </div>
    <div class="feedback-success hidden" id="feedbackSuccess">✅ 已发送，感谢反馈！</div>
  </div>
</div>

  '幽暗国度：印度三部曲Ⅰ': '奈保尔首次游历印度的旅行文学。作为特立尼达的印度裔作家，他以疏离而尖锐的目光审视这片祖辈故土，对其贫困、虔诚与停滞提出了毫不留情的批判。',
  '受伤的文明：印度三部曲Ⅱ': '奈保尔第二次到访印度时适逢甘地夫人宣布紧急状态。他深入各阶层访谈，认为印度的危机不仅在于政治经济，更在于一个"早已被挫败的文明"的深层精神危机。',
  '百万叛变的今天：印度三部曲Ⅲ': '奈保尔的诺贝尔奖代表作，三部曲终篇。以孟买为中心，通过大量人物访谈，记录印度在现代化压力下各阶层、各宗教群体的自我意识觉醒与身份重构。',
  '孟买：欲望丛林': '苏科图·梅塔的非虚构杰作。通过歌舞伎、黑道、宝莱坞、童工等多重视角，呈现这座混沌而充满活力的南亚超级城市的真实面貌，入围普利策奖决赛。',
  '低地国家史': '叙述比利时、荷兰、卢森堡三国从古代到当代的历史演变。这片小国林立的西欧十字路口如何在大国夹缝中孕育出独特的商业文明、新教传统与自由精神。',
  '她来自马里乌波尔': '德国作家娜塔莎·沃丁所著。作者追溯母亲的身世，发现她是二战时被纳粹强制征用的东方劳工，由此串联起一段跨越乌克兰、苏联与德国的20世纪离散史。',
  '风暴之海：加勒比海五百年': '以加勒比海为中心的区域通史。从哥伦布到殖民竞争、奴隶贸易、独立运动与冷战博弈，记录这片热带海域五百年间交织的暴力、反抗与文化混融。',
  '罗马史': '古罗马史学家阿庇安所著。以各民族与罗马的战争为线索，记述罗马从城邦扩张为帝国的历史，是研究共和末期、内战时期以及东方战争史的重要一手文献。',
  '古希腊罗马名人传': '普鲁塔克的《希腊罗马名人传》。以希腊与罗马名人对比传记的形式，记录亚历山大、凯撒、梭伦、西塞罗等人的生平与德行，是西方传记文学的奠基之作。',
  '渐行渐远古村落': '记录中国行将消失的传统村落的田野纪实。通过对各地古村落的实地走访，呈现宗族文化、传统建筑与乡土记忆在现代化冲击下的逐渐流逝，具有历史存档价值。',
  '12幅地图中的世界史': '历史学家杰里·布罗顿所著。以12幅具有历史转折意义的地图为切入点，揭示制图背后的政治意图与权力叙事，展现人类如何用地图理解和建构自己的世界。',

  // ── 社会科学 ──────────────────────────────────────
  '国富论': '亚当·斯密于1776年出版的经济学奠基之作。提出"看不见的手"与劳动分工理论，论证自由市场如何增进国民财富，奠定了古典经济学与现代市场经济思想的理论基础。',
  '贫穷的本质': '诺贝尔经济学奖得主阿比吉特·班纳吉与艾丝特·迪弗洛合著。以全球多个发展中国家的田野调查为基础，揭示贫困的结构性成因与反贫困政策的有效路径。',
  '乡土中国': '费孝通的社会学经典。以"差序格局"等原创概念，系统分析中国传统农村社会的伦理秩序、权力结构与文化特征，是理解中国社会底层逻辑的必读之作。',
  '社会生活中的交换与权力': '社会学家彼得·布劳的理论著作。将经济学交换理论引入社会学，分析人际互动中的互惠逻辑、权力不对称与社会结构的形成机制，是微观社会学的重要里程碑。',
  '经济学的思维方式': '经济学家保罗·海恩所著的经济学导论。以大量生活案例展示激励、边际决策、机会成本等经济学基本思维框架，如何帮助我们理解日常现象与公共政策的权衡。',
  '枪炮、病菌和钢铁': '贾雷德·戴蒙德的普利策奖作品。从地理与生态学视角回答"为什么是欧洲人征服了美洲，而不是相反"，以宏大视野解释人类文明发展不平衡性的地理根源。',
  '为什么有的国家富裕，有的贫穷': '大卫·兰德斯的历史经济学著作。从文化、地理、制度等多维度比较各国经济发展轨迹，认为文化与价值观是解释国家贫富差距不可忽视的关键变量。',
  '宏观经济学二十五讲': '系统讲解宏观经济学核心理论的讲义读本。涵盖国民收入核算、货币政策、财政政策、国际贸易与经济周期等主要议题，兼顾理论体系与政策应用。',
  '黑格尔历史哲学著作': '黑格尔关于历史哲学的讲稿合集。提出"历史是精神自我实现的过程"，将人类历史划分为东方、希腊罗马与日耳曼三个精神发展阶段，是德国古典哲学的核心文本。',

  // ── 哲学 ──────────────────────────────────────────
  '理想国': '柏拉图最重要的哲学对话录。以苏格拉底之口探讨正义、灵魂与理想城邦的构建，提出"哲学王"理论与"洞穴寓言"，是西方哲学史上最具影响力的著作之一。',
  '范畴篇·解释篇': '亚里士多德逻辑学著作。《范畴篇》建立存在的基本分类体系，《解释篇》探讨命题与真假判断，共同构成西方逻辑学传统的源头，是学习亚里士多德哲学的基础读本。',
  '规训与惩罚': '米歇尔·福柯的权力考古学名著。以近代欧洲监狱制度演变为案例，分析现代权力如何通过监视、规范化与惩罚将身体改造为"驯顺的身体"，并将此逻辑延伸至学校、工厂与医院。',
  '论幸福生活': '塞涅卡的斯多葛哲学论文。论证真正的幸福不在于财富或感官享乐，而在于与自然和理性的和谐，以及对命运的从容接纳，是斯多葛伦理学的简明精粹。',
  '查拉图斯特拉如是说': '尼采的哲学诗剧。借先知查拉图斯特拉之口宣告"上帝已死"，提出超人理想、权力意志与永恒轮回等核心思想，以散文诗形式颠覆西方道德传统。',
  '在通向语言的途中': '海德格尔关于语言哲学的论文集。提出"语言是存在的家园"，探讨诗性语言、命名与存在的关系，是海德格尔后期思想的核心文本之一，以晦涩深邃著称。',
  '论老年·论友谊·论责任': '西塞罗的三篇哲学散文。以优美的拉丁文探讨老年的价值、真诚友谊的条件与道德责任的本质，是斯多葛与柏拉图思想的罗马式综合，是西方人文传统的经典读本。',
  '哲学的慰藉': '波爱修斯在被判死刑的狱中所著。以"哲学女神"与他对话的形式，探讨命运、幸福与善的本质，是中世纪最广泛阅读的哲学著作，也是逆境中寻找意义的永恒文本。',
  '亚里士多德相关著作': '亚里士多德哲学著作群，涵盖《尼各马可伦理学》《政治学》《形而上学》《诗学》等经典。这些文本奠定了西方哲学、伦理学、政治理论与文学批评的基础框架。',

  // ── 心理/成长 ──────────────────────────────────────
  '活出生命的意义': '维克多·弗兰克尔的心理学经典。作者以奥斯维辛集中营的亲身经历，阐述意义疗法的核心：即使在最极端的苦难中，人仍有选择自身态度的自由，意义是生存的最终动力。',
  '当良知沉睡：辨认身边的反社会人格者': '心理学家玛莎·斯托特所著。揭示约4%人口的反社会人格障碍者的行为模式与操控手法，帮助读者识别无良知者的特征，并保护自己免受其长期伤害。',
  '自恋也疯狂：面具下的极端自恋者': '聚焦自恋型人格障碍的心理学读本。分析极端自恋者如何通过魅力、控制与情感操纵维系自我幻象，以及如何识别并应对身边的自恋者，适合普通读者阅读。',
  '我们时代的神经症人格': '心理学家卡伦·霍妮的精神分析著作。以文化社会视角批判弗洛伊德的生物决定论，认为神经症源于现代文化中爱与竞争的内在冲突，而非固定的本能冲动。',
  '关键对话：如何高效能沟通': '高风险沟通技巧经典。聚焦高压、高情绪对话场景，提供一套将分歧转化为有效对话的实践框架，被《财富》500强广泛用于管理培训与领导力发展。',
  '学习之道': '国际象棋神童、太极拳世界冠军乔希·维茨金所著。分享他在截然不同领域追求卓越的心得：如何在压力下表现、如何从失败中学习、如何进入高度专注的流动状态。',
  '箭术与禅心：一位西方哲学家的禅悟实录': '德国哲学家赫里格尔在日本学习弓道的体验记录。通过数年艰苦修炼，他领悟到禅宗"无意识的有意识"的精髓，成为西方读者认识东方禅学的经典入门读物。',
  '持续行动：从想到到做到': '关于执行力与习惯养成的实用指南。强调"开始行动"比"完美计划"更重要，提供将想法转化为持续行动的具体方法，帮助读者跨越"想到"与"做到"之间的鸿沟。',
  '对赌：信息不足时如何做出高明决策': '扑克冠军安妮·杜克所著。将职业扑克中的决策智慧提炼为通用框架：在不确定性下如何区分"结果质量"与"决策质量"，避免以结果反推决策好坏的认知陷阱。',

  // ── 科技/科学 ──────────────────────────────────────
  '奇点更近': '雷·库兹韦尔的技术预言著作。预测到2045年人工智能将超越人类智能，生命科技将大幅延长寿命，描绘一个人机融合的技术奇点后世界，以及达到这一临界点的路径。',
  '黑客与画家': '硅谷创业教父保罗·格雷厄姆的思想随笔集。以"黑客"与艺术家的类比探讨创造力、财富、语言与编程的本质，是理解硅谷技术文化与创业精神的经典文本。',
  '浪潮之巅': '吴军所著IT行业史。以英特尔、谷歌、苹果、微软等科技巨头的兴衰沉浮为主线，分析商业规律与技术创新如何共同塑造现代科技产业格局，兼具可读性与洞察力。',
  '七堂极简物理课': '意大利物理学家卡洛·罗韦利所著。以优雅的文字介绍相对论、量子力学、宇宙学等物理学核心概念，是近年最受欢迎的科普小书之一，百余页即可领略现代物理之美。',

  // ── 文学 ──────────────────────────────────────────
  '悲惨世界': '维克多·雨果的不朽史诗。冉·阿让的救赎之路与滑铁卢战役、巴黎街垒的宏大背景交织，探讨法律、道德、贫困与人性尊严的永恒主题，是19世纪法国文学的巅峰之作。',
  '活着': '余华的长篇小说。以中国农民福贵的一生为线索，穿越内战、大跃进、文化大革命，以平静克制的笔调书写绝望中的韧性——活着，本身便是一种沉默的尊严。',
  '草叶集': '美国诗人沃尔特·惠特曼的诗歌总集。以自由诗形式颂扬个人、民主与自然的合一，宣告一种全新的美国诗歌精神，对后世现代主义诗歌产生了深远而持久的影响。',
  '欢乐的葬礼': '俄国作家柳德米拉·乌利茨卡娅的小说。一位旅居纽约的俄国艺术家弥留之际，昔日好友聚集床前，在死亡的边缘上演了一出关于友情、失落与流亡的温情闹剧。',
  '纯真博物馆': '土耳其诺贝尔奖作家奥尔汉·帕慕克的长篇小说。伊斯坦布尔富家子弟凯末尔对远亲芙颂的痴迷之爱跨越数十年，他将与她有关的一切物件收入博物馆，构成一部对失去之物的百科全书式挽歌。',
  '彼得堡的大师': '诺贝尔奖作家J.M.库切所著。想象陀思妥耶夫斯基赴彼得堡寻找在革命运动中死去继子的经历，探讨父子之情、艺术创作与政治之间难以调和的深层张力。',
  '局外人': '法国作家阿尔贝·加缪的存在主义小说。主角默尔索对母亲之死漠然，在北非烈日下开枪杀人，以绝对"局外人"的姿态面对社会道德与司法审判，揭示荒诞存在的本质。',
  '青梅竹马': '日本明治时代女作家樋口一葉的代表作。故事发生在东京吉原花街旁的胡同里，以细腻笔触描绘一群少年少女在成长门槛前转瞬即逝的纯真情谊，语言古雅，意境哀婉。',
  '时间的玫瑰': '诗人北岛的诗歌评论集。收录他对策兰、特朗斯特罗默、洛尔迦等十位世界诗人的深情解读，以诗人之眼阅读诗人，是一部个人化的世界诗歌漫游与精神对话。',
  '农民': '波兰作家雷蒙特的诺贝尔奖作品。以一个波兰农村家庭为核心，随四季轮转徐徐展开农民的劳作、婚恋、族群冲突与宗教信仰，是农民史诗类文学的巅峰之作。',
  '奈保尔作品': 'V.S.奈保尔的作品。这位特立尼达裔英国作家以冷峻笔触审视后殖民世界的焦虑与身份困境，荣获2001年诺贝尔文学奖。代表作包括《大河湾》《抵达之谜》等。',
  '博尔赫斯作品': '阿根廷作家豪尔赫·路易斯·博尔赫斯的作品。以迷宫、镜子、无限图书馆等意象构建精妙的元小说，融汇哲学与虚构，对世界文学产生了难以估量的深远影响。',
  '纳博科夫作品': '俄裔美国作家弗拉基米尔·纳博科夫的作品。以《洛丽塔》《微暗的火》等作品著称，语言炫目、结构精巧，是文学现代主义的极致体现，也是双语写作的罕见范例。',
  '福楼拜作品': '法国作家古斯塔夫·福楼拜的作品。以《包法利夫人》开创现代写实主义，以"恰当词语"（le mot juste）为标准的写作美学，影响了此后整个欧洲乃至世界文学传统。',

  // ── 艺术/文化 ──────────────────────────────────────
  '古希腊罗马艺术为什么重要': '艺术史家以问题为导向重新审视古典艺术遗产。探讨希腊罗马的雕塑、绘画与建筑如何持续塑造西方审美与文化价值观，适合对古典艺术感兴趣的普通读者入门。',
  '叶嘉莹说汉魏六朝诗': '古典诗词学者叶嘉莹的诗歌讲义。以其"兴发感动"的诗学理论，深度解读曹操、陶渊明、谢灵运等人的代表作，引导读者进入汉魏六朝诗歌的精神世界。',
  '傅雷家书': '翻译家傅雷写给旅欧钢琴家儿子傅聪的书信集。字里行间传递父亲对艺术、人格、爱情与爱国的深沉思考，是中国现代文化史上最动人的家庭文献之一。',
  '论摄影': '苏珊·桑塔格的视觉文化批评名著。探讨摄影如何改变我们对现实、记忆与苦难的感知，以及图像的工业化生产如何导致"同情心疲劳"，是摄影批评领域的奠基文本。',
  '哈佛非虚构写作课': '汇集哈佛写作课的理论与实践精华，涵盖新闻调查、个人叙事与跨文化报道的写作技巧，适合有志于非虚构写作的读者系统提升叙事能力与结构意识。',
  '外国文化名人自画像': '收录外国文学家、艺术家、哲学家的自述文字。以第一人称呈现创作者的内心世界、美学立场与人生哲学，是了解西方文化精英思想的第一手读本。',

  // ── 运动/健康 ──────────────────────────────────────
  '生活是一场比赛': '运动心理学与竞技表现读本。探讨顶级运动员如何在压力下保持专注、建立心理韧性与突破极限，并将竞技智慧转化为日常工作与生活中的行动哲学。',
  '力量与体能': '系统介绍运动力量训练科学原理与方法的著作。涵盖周期化训练、基础动作模式与运动表现提升，适合运动员、教练及健身爱好者深入学习力量训练体系。',

function buildGeoData() {
  const geo = {};
  for (const cat of DATA) {
    if (cat.id !== 'geopolitical') continue;
    const books = cat.subs ? cat.subs.flatMap(s => s.books) : (cat.books || []);
    for (const b of books) {
      if (!b.geo) continue;
      for (const id of b.geo) {
        if (!geo[id]) geo[id] = {label: GEO_LABELS[id] || String(id), books: []};
        geo[id].books.push(b);
      }
    }
  }
  return geo;
}
const GEO_DATA = buildGeoData();

function buildMain(b) {
  if (b.author) return `${b.name}<span class="book-subject">（${b.author}）</span>`;
  return b.name;
}
function makeItem(b, isBio, catLabel) {
  const el = document.createElement('div');
  let cls = 'book-item';
  if (b.disabled) cls += ' no-click';
  el.className = cls;
  const badge = b.subject ? `<span class="book-about">${b.subject}</span>` : '';
  const enLine = b.original ? `<span class="book-en">${b.original}</span>` : '';
  el.innerHTML = `${badge}<div class="book-dot"></div><div class="book-body"><div class="book-main">${buildMain(b)}</div>${enLine}</div>`;
  if (!b.disabled) el.onclick = () => openModal(b, catLabel);
  return el;
}
function render() {
  const root = document.getElementById('root');
  root.innerHTML = '';
  DATA.forEach(cat => {
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.dataset.category = cat.id;
    const count = cat.subs ? cat.subs.reduce((a,s)=>a+s.books.length,0) : (cat.books?.length||0);
    sec.innerHTML = `<div class="section-header"><span class="section-emoji">${cat.emoji}</span><span class="section-title">${cat.title}</span><span class="section-count">${count} 本</span></div>`;
    if (cat.hasMap) {
      const tog = document.createElement('div');
      tog.className = 'view-toggle';
      tog.innerHTML = `<button class="view-btn active" data-view="map" onclick="switchGeoView('map',this)">🗺 地图视图</button><button class="view-btn" data-view="list" onclick="switchGeoView('list',this)">☰ 列表视图</button>`;

      sec.appendChild(mapView);
      const listView = document.createElement('div');
      listView.id = 'geoListView';
      listView.className = 'hidden';
      cat.subs.forEach(sub => {
        const sw = document.createElement('div'); sw.className = 'subsection';
        sw.innerHTML = `<div class="subsection-title">${sub.title}</div>`;
        const grid = document.createElement('div'); grid.className = 'book-grid';
        sub.books.forEach(b => grid.appendChild(makeItem(b, false, cat.title + ' · ' + sub.title)));
        sw.appendChild(grid); listView.appendChild(sw);
      });
      sec.appendChild(listView);
    } else if (cat.subs) {
      cat.subs.forEach(sub => {
        const sw = document.createElement('div'); sw.className = 'subsection';
        sw.innerHTML = `<div class="subsection-title">${sub.title}</div>`;
        const grid = document.createElement('div'); grid.className = 'book-grid';
        sub.books.forEach(b => grid.appendChild(makeItem(b, cat.id==='biography', cat.title+' · '+sub.title)));
        sw.appendChild(grid); sec.appendChild(sw);
      });
    } else if (cat.books) {
      const grid = document.createElement('div'); grid.className = 'book-grid';
      cat.books.forEach(b => grid.appendChild(makeItem(b, false, cat.title)));
      sec.appendChild(grid);
    }
    root.appendChild(sec);
  });
  const ms = document.createElement('div');
  ms.className = 'section'; ms.dataset.category = 'media';
  const mTag = m => `<a href="${m.url}" target="_blank" rel="noopener" class="media-tag">${m.name}${m.zh ? ` · <span class="media-tag-zh">${m.zh}</span>` : ''}</a>`;
  ms.innerHTML = `<div class="section-header"><span class="section-emoji">📰</span><span class="section-title">媒体 / 杂志</span></div>
    <div class="subsection"><div class="subsection-title">English</div><div class="media-hint">遇到付费墙？可使用 Chrome 插件 <a href="https://github.com/csns1/bypass-paywalls-chrome-clean-magnolia1234" target="_blank" rel="noopener">Bypass Paywalls Clean</a></div><div class="media-tags">${MEDIA.en.map(mTag).join('')}</div></div>
    <div class="subsection"><div class="subsection-title">中文</div><div class="media-tags">${MEDIA.zh.map(mTag).join('')}</div></div>
    <div class="media-series"><h4>丛书 / 系列</h4><div class="media-tags">${MEDIA.series.map(mTag).join('')}</div></div>`;
  root.appendChild(ms);
  updateCount();
  setTimeout(initWorldMap, 80);
}
function switchGeoView(view, btn) {
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const mv=document.getElementById('geoMapView'), lv=document.getElementById('geoListView');
  if (view==='map') { mv.classList.remove('hidden'); lv.classList.add('hidden'); initWorldMap(); }
  else { closeTT(); mv.classList.add('hidden'); lv.classList.remove('hidden'); }
}
let mapReady = false, activeFid = null, mapSvg = null;
const bookCountOf = id => GEO_DATA[id]?.books?.length || 0;
const baseOp = id => GEO_DATA[id] ? Math.min(0.48 + bookCountOf(id)*0.12, 0.9) : 0.82;
async function initWorldMap() {
  if (mapReady) return;
  try {
    const world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    mapReady = true;
    const el = document.getElementById('worldMap');
    el.innerHTML = '';
    const W = el.clientWidth || 840, H = Math.round(W * 0.50);
    mapSvg = d3.select(el).append('svg').attr('viewBox',`0 0 ${W} ${H}`).attr('width','100%').style('display','block');
    mapSvg.append('rect').attr('width',W).attr('height',H).attr('fill','#8fb8c6').attr('opacity',.55).style('cursor','default').on('click', () => closeTT());
    const proj = d3.geoNaturalEarth1().scale(W/6.28).translate([W/2, H/2]);
    const pathGen = d3.geoPath().projection(proj);
    const features = topojson.feature(world, world.objects.countries).features;
    mapSvg.selectAll('.country').data(features).join('path')
      .attr('class','country').attr('d', pathGen)
      .attr('fill', d => GEO_DATA[+d.id] ? 'var(--accent)' : 'var(--paper-dark)')
      .attr('fill-opacity', d => baseOp(+d.id))
      .attr('stroke','rgba(255,255,255,0.6)').attr('stroke-width',0.4)
      .style('cursor', d => GEO_DATA[+d.id] ? 'pointer' : 'default')
      .on('mouseenter', function(event,d) {
        if (!GEO_DATA[+d.id]) return;
        d3.select(this).attr('fill-opacity', 0.95).attr('stroke-width', 0.9);
      })
      .on('mouseleave', function(event,d) {
        const id = +d.id;
        if (!GEO_DATA[id]) return;
        if (id !== activeFid) d3.select(this).attr('fill-opacity', baseOp(id)).attr('stroke-width', 0.4);
      })
      .on('click', function(event,d) {
        event.stopPropagation();
        const id = +d.id, data = GEO_DATA[id];
        if (!data) return;
        if (activeFid === id) {
          d3.select(this).attr('fill-opacity', baseOp(id)).attr('stroke-width', 0.4);
          activeFid = null; hideTT();
        } else {
          if (activeFid !== null) resetCountry(activeFid);
          activeFid = id;
          d3.select(this).attr('fill-opacity', 0.95).attr('stroke-width', 0.9);
          showTT(event, data);
        }
      });
    document.getElementById('mapTooltip').addEventListener('click', e => e.stopPropagation());
  } catch(e) {
    document.getElementById('worldMap').innerHTML = '<div class="map-loading">地图加载失败，请检查网络后刷新。列表视图仍可正常使用。</div>';
  }
}
function resetCountry(fid) {
  if (!mapSvg) return;
  mapSvg.selectAll('.country').each(function(d) {
    if (+d.id === fid) d3.select(this).attr('fill-opacity', baseOp(fid)).attr('stroke-width', 0.4);
  });
}
function showTT(event, data) {
  const tt = document.getElementById('mapTooltip');
  const booksHtml = data.books.map(b => {
    const escaped = b.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<span class="map-tt-book" onclick="bookFromMap('${escaped}')">${b.name}</span>`;
  }).join('');
  tt.innerHTML = `<button class="map-tt-close" onclick="closeTT()">×</button><div class="map-tt-region">${data.label}</div>${booksHtml}`;
  tt.style.display = 'block';
  const wrap = document.getElementById('mapWrap');
  const rect = wrap.getBoundingClientRect();
  let x = event.clientX - rect.left + 16;
  let y = event.clientY - rect.top - 16;
  tt.style.left = x + 'px'; tt.style.top = y + 'px';
  requestAnimationFrame(() => {
    const tw = tt.offsetWidth, th = tt.offsetHeight;
    const ww = wrap.clientWidth, wh = wrap.clientHeight;
    if (x + tw > ww - 8) x = Math.max(5, event.clientX - rect.left - tw - 16);
    if (y + th > wh - 8) y = Math.max(5, wh - th - 8);
    tt.style.left = x + 'px'; tt.style.top = y + 'px';
  });
}
function hideTT() { document.getElementById('mapTooltip').style.display = 'none'; }
function closeTT() {
  hideTT();
  if (activeFid !== null) { resetCountry(activeFid); activeFid = null; }
}
function bookFromMap(name) {
  closeTT();
  const res = findBook(name);
  if (res) openModal(res.book, res.catLabel);
}
function findBook(name) {
  for (const cat of DATA) {
    if (cat.subs) {
      for (const sub of cat.subs) {
        const b = sub.books.find(b=>b.name===name);
        if (b) return {book:b, catLabel:cat.title+' · '+sub.title};
      }
    } else if (cat.books) {
      const b = cat.books.find(b=>b.name===name);
      if (b) return {book:b, catLabel:cat.title};
    }
  }
  return null;
}
function resetGeoView() {
  const mv = document.getElementById('geoMapView'), lv = document.getElementById('geoListView');
  if (!mv || !lv) return;
  mv.classList.remove('hidden');
  lv.classList.add('hidden');
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === 'map'));
}
function filterCat(cat, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.section').forEach(s=>s.classList.toggle('hidden', cat!=='all'&&s.dataset.category!==cat));
  document.querySelectorAll('.book-item').forEach(i=>i.classList.remove('hidden'));
  resetGeoView();
  updateCount();
}
function onSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('hidden'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.tab-btn').classList.add('active');
  if (!q) {
    document.querySelectorAll('.book-item').forEach(i=>i.classList.remove('hidden'));
    document.getElementById('noResults').style.display='none';
    resetGeoView();
    updateCount(); return;
  }
  const lv=document.getElementById('geoListView'), mv=document.getElementById('geoMapView');
  if (lv && lv.classList.contains('hidden')) {
    lv.classList.remove('hidden'); mv.classList.add('hidden');
    document.querySelectorAll('.view-btn').forEach(b=>b.classList.toggle('active', b.dataset.view==='list'));
  }
  let any=false;
  document.querySelectorAll('.section').forEach(sec=>{
    if (sec.dataset.category==='media'){const h=sec.textContent.toLowerCase().includes(q);sec.classList.toggle('hidden',!h);if(h)any=true;return;}
    const items=sec.querySelectorAll('.book-item');let h=false;
    items.forEach(i=>{const m=i.textContent.toLowerCase().includes(q);i.classList.toggle('hidden',!m);if(m)h=true;});
    sec.classList.toggle('hidden',!h);if(h)any=true;
  });
  document.getElementById('noResults').style.display=any?'none':'block';
  updateCount();
}
function updateCount() {
  document.getElementById('totalCount').textContent=document.querySelectorAll('.book-item').length;
  const visible = [...document.querySelectorAll('.book-item:not(.hidden)')].filter(el=>!el.closest('.section').classList.contains('hidden'));
  document.getElementById('visibleCount').textContent=visible.length;
}
function openModal(b, catLabel) {
  document.getElementById('mCat').textContent=catLabel;
  document.getElementById('mTitle').textContent=b.name;
  const enEl=document.getElementById('mEn');enEl.textContent=b.original||'';enEl.style.display=b.original?'':'none';
  const meta=[b.subject,b.author].filter(Boolean).join(' · ');
  const metaEl=document.getElementById('mMeta');metaEl.textContent=meta;metaEl.style.display=meta?'':'none';
  document.getElementById('mDouban').href=`https://search.douban.com/book/subject_search?search_text=${encodeURIComponent(b.name)}&cat=1001`;
  document.getElementById('mZlib').href=b.original?`https://1lib.sk/s/${encodeURIComponent(b.original)}?`:`https://1lib.sk/s/${encodeURIComponent(b.name)}?`;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
  const desc=document.getElementById('mDesc');
  const text = DESCRIPTIONS[b.name];
  desc.className='modal-desc';
  desc.textContent = text || '暂无简介。';
}
function closeModal(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}
function maybeClose(e){if(e.target===document.getElementById('overlay'))closeModal();}

function openFeedback(){
  document.getElementById('feedbackOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeFeedback(){
  const ov=document.getElementById('feedbackOverlay');
  ov.classList.remove('open');
  document.body.style.overflow='';
  document.getElementById('feedbackForm').classList.remove('hidden');
  document.getElementById('feedbackSuccess').classList.add('hidden');
  document.getElementById('feedbackError').textContent='';
  document.getElementById('fEmail').value='';
  document.getElementById('fMessage').value='';
  document.getElementById('feedbackSubmitBtn').disabled=false;
  document.getElementById('feedbackSubmitBtn').textContent='发送';
}
function maybeFeedbackClose(e){if(e.target===document.getElementById('feedbackOverlay'))closeFeedback();}
async function submitFeedback(e){
  e.preventDefault();
  const btn=document.getElementById('feedbackSubmitBtn');
  const errEl=document.getElementById('feedbackError');
  btn.disabled=true;
  btn.textContent='发送中…';
  errEl.textContent='';
  try{
    const resp=await fetch('https://formspree.io/f/xojrkdab',{
      method:'POST',
      headers:{'Accept':'application/json','Content-Type':'application/json'},
      body:JSON.stringify({
        email:document.getElementById('fEmail').value,
        message:document.getElementById('fMessage').value
      })
    });
    if(resp.ok){
      document.getElementById('feedbackForm').classList.add('hidden');
      document.getElementById('feedbackSuccess').classList.remove('hidden');
    } else {
      errEl.textContent='发送失败，请稍后再试。';
      btn.disabled=false;
      btn.textContent='发送';
    }
  }catch(_){
    errEl.textContent='网络错误，请检查连接后重试。';
    btn.disabled=false;
    btn.textContent='发送';
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeFeedback();}});
render();
</script>
